status = warn
name = IntegrationShareLogging

appenders = console, file

appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{ISO8601} %x %-5p [%c{3}] [%t] %m%n

appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = share.log
appender.file.filePattern = share.log.%d{yyyy-MM-dd}
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd} %d{ABSOLUTE} %-5p [%c] [%t] %m%n
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true

rootLogger.level = error
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File

logger.spring.name = org.springframework
logger.spring.level = warn
logger.springRemoting.name = org.springframework.remoting.support
logger.springRemoting.level = error
logger.springUtil.name = org.springframework.util
logger.springUtil.level = error

logger.myfacesDebugUtils.name = org.apache.myfaces.util.DebugUtils
logger.myfacesDebugUtils.level = info
logger.myfacesVariableResolver.name = org.apache.myfaces.el.VariableResolverImpl
logger.myfacesVariableResolver.level = error
logger.myfacesJspView.name = org.apache.myfaces.application.jsp.JspViewHandlerImpl
logger.myfacesJspView.level = error
logger.myfacesTaglib.name = org.apache.myfaces.taglib
logger.myfacesTaglib.level = error

logger.alfresco.name = org.alfresco
logger.alfresco.level = error
logger.alfrescoConfig.name = org.alfresco.config
logger.alfrescoConfig.level = warn
logger.alfrescoJndi.name = org.alfresco.config.JndiObjectFactoryBean
logger.alfrescoJndi.level = warn
logger.alfrescoWeb.name = org.alfresco.web
logger.alfrescoWeb.level = info

logger.webscripts.name = org.springframework.extensions.webscripts
logger.webscripts.level = info
logger.webscriptsScriptLogger.name = org.springframework.extensions.webscripts.ScriptLogger
logger.webscriptsScriptLogger.level = warn
logger.webscriptsScriptDebugger.name = org.springframework.extensions.webscripts.ScriptDebugger
logger.webscriptsScriptDebugger.level = off